<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPGA-Wand | Edge-to-Cloud Gesture System</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #0f172a;
    color: #f1f5f9;
}
header {
    background: #1e293b;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}
nav {
    display: flex;
    justify-content: center;
    background: #0ea5e9;
}
nav button {
    background: none;
    border: none;
    padding: 15px 30px;
    font-size: 16px;
    cursor: pointer;
    color: white;
}
nav button:hover {
    background: rgba(255,255,255,0.2);
}
.container {
    padding: 40px;
    max-width: 1000px;
    margin: auto;
}
.section { display: none; }
.active { display: block; }

.card {
    background: #1e293b;
    padding: 25px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input, button.action-btn {
    padding: 10px;
    margin-top: 10px;
    width: 100%;
    border-radius: 5px;
    border: none;
    font-size: 14px;
}

button.action-btn {
    background-color: #0ea5e9;
    color: white;
    cursor: pointer;
}
button.action-btn:hover {
    background-color: #0284c7;
}

.status {
    margin-top: 15px;
    font-weight: bold;
    color: #38bdf8;
}

img {
    width: 256px;
    height: 256px;
    background: #0f172a;
    border-radius: 8px;
    margin-top: 15px;
}

textarea {
    width: 100%;
    height: 200px;
    margin-top: 10px;
    background-color: #0f172a;
    color: #38bdf8;
    font-family: monospace;
    border: none;
    padding: 10px;
}
</style>
</head>

<body>

<header>FPGA-Wand</header>

<nav>
    <button onclick="showSection('calibration')">Wand Calibration</button>
    <button onclick="showSection('gesture')">Gesture Detection</button>
    <button onclick="showSection('database')">Database Check</button>
</nav>

<div class="container">

<!-- Calibration -->
<div id="calibration" class="section active">
    <div class="card">
        <h2>Wand Status</h2>
        <button class="action-btn" onclick="loadWands()">Load Active Wands</button>
        <textarea id="wandStatus" readonly></textarea>
    </div>
</div>

<!-- Gesture Detection -->
<div id="gesture" class="section">
    <div class="card">
        <h2>Live Gesture Rendering</h2>

        <label>Wand ID:</label>
        <input type="number" id="wandId" placeholder="Enter Wand ID">

        <button class="action-btn" onclick="startLive()">Start Live View</button>
        <button class="action-btn" onclick="loadLatest()">Load Latest Attempt</button>

        <div class="status" id="gestureStatus">Status: Idle</div>

        <img id="liveImage" src="" alt="Live Wand Render">
    </div>
</div>

<div id="database" class="section">
    <div class="card">
        <h2>Database Check</h2>
        <p>View latest finalized attempts stored in PostgreSQL.</p>

        <button class="action-btn" onclick="loadDatabase()">Load Attempts</button>

        <textarea id="databaseData" readonly>
Press "Load Attempts" to fetch data...
        </textarea>
    </div>
</div>

</div>

<script>
let liveInterval = null;

function showSection(sectionId) {
    document.querySelectorAll('.section')
        .forEach(section => section.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
}

// ----------------------------
// Load Active Wands
// ----------------------------
async function loadWands() {
    const textarea = document.getElementById("wandStatus");
    textarea.value = "Loading...";

    try {
        const res = await fetch("/api/v1/wands");
        const data = await res.json();
        textarea.value = JSON.stringify(data, null, 2);
    } catch (err) {
        textarea.value = "Error connecting to backend.";
    }
}

// ----------------------------
// Live Image Polling
// ----------------------------
function startLive() {
    const wandId = document.getElementById("wandId").value;
    const img = document.getElementById("liveImage");
    const status = document.getElementById("gestureStatus");

    if (!wandId) {
        alert("Enter a Wand ID");
        return;
    }

    status.innerText = "Status: Streaming live image...";

    if (liveInterval) clearInterval(liveInterval);

    liveInterval = setInterval(() => {
        img.src = `/api/v1/wand/${wandId}/live.png?ts=${Date.now()}`;
    }, 500);
}

// ----------------------------
// Load Latest Finalized Attempt (DB-backed)
// ----------------------------
async function loadLatest() {
    const wandId = document.getElementById("wandId").value;
    const status = document.getElementById("gestureStatus");
    const img = document.getElementById("liveImage");

    if (!wandId) {
        alert("Enter a Wand ID");
        return;
    }

    try {
        const res = await fetch(`/api/v1/attempt/latest?wand_id=${wandId}`);
        if (!res.ok) throw new Error();

        const data = await res.json();

        status.innerText = 
            `Detected: ${data.result.status} | Score: ${data.result.score ?? "N/A"}`;

        img.src = data.image_png + `?ts=${Date.now()}`;

    } catch (err) {
        status.innerText = "No attempts found for this wand.";
    }
}

// ----------------------------
// Check API Health on Load
// ----------------------------
window.onload = async function() {
    try {
        const res = await fetch("/api/v1/health");
        const data = await res.json();
        console.log("Backend connected:", data);
    } catch {
        alert("Backend not reachable. Make sure FastAPI server is running.");
    }
}

async function loadDatabase() {
    const textarea = document.getElementById("databaseData");
    textarea.value = "Loading database data...";

    try {
        const res = await fetch("/api/v1/database/attempts");
        const data = await res.json();
        textarea.value = JSON.stringify(data, null, 2);
    } catch (err) {
        textarea.value = "Error loading database data.";
    }
}
</script>

</body>
</html>
